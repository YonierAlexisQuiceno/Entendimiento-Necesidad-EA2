name: Python Scraper CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: ${{ secrets.DB_USER || 'postgres' }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD || 'admin' }}
          POSTGRES_DB: ${{ secrets.DB_NAME || 'shopanalytics' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python 3.10
      uses: actions/setup-python@v3
      with:
        python-version: "3.10"
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
    - name: Lint with flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Test Database Connection & Syntax
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: ${{ secrets.DB_USER || 'postgres' }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD || 'admin' }}
        DB_NAME: ${{ secrets.DB_NAME || 'shopanalytics' }}
      run: |
        # Verificamos que el código compile y se pueda importar sin fallos de sintaxis severos
        python -c "from src.scraper import BBCMundoScraperPOO; print('Sintaxis y Módulos OK')"
