name: Integración Continua (ShopAnalytics)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test_pipeline:
    name: Probar entorno y dependencias (EA4)
    runs-on: ubuntu-latest

    steps:
    - name: Clonar el repositorio
      uses: actions/checkout@v3

    - name: Configurar Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Validar sintaxis del código
      run: |
        # Verificamos que los archivos principales se puedan compilar sin errores de sintaxis
        python -m py_compile src/ea1.py
        python -m py_compile src/scrapper.py
        python -m py_compile src/modelo.py
        python -m py_compile src/ejecucion.py
